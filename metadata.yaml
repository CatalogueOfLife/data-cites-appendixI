identifier:
  clb: 314512
  
title: CITES Checklist – Appendix I
alias: CITESI

description: | 
    CITES (Convention on International Trade in Endangered Species of Wild Fauna and Flora) is a binding international agreement between governments designed to ensure that international trade in wild animal and plant specimens does not threaten their survival. Appendix I represents the highest tier of protection under the convention, covering species most at risk from over-exploitation through international trade, for which commercial trade is generally prohibited except in extraordinary circumstances such as scientific research.
    
    For this dataset the the CITES Checklist was standardized using COLDP. It includes scientific names, synonyms, and common names in English, French, and Spanish, and distributions relevant for the CITES scope.

keyword: 
  - CITES Checklist
  - Protection


